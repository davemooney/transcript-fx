name: ci

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  core:
    name: "@transcript-fx/core — typecheck · test · build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  lab:
    name: "React lab — adapter test · build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build
